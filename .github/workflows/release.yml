name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(cat VERSION)
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o gt-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: gt-${{ matrix.goos }}-${{ matrix.goarch }}
